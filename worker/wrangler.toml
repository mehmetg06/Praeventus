# Cloudflare Worker config for the Praeventus privacy proxy.
# Deploy with:  npx wrangler deploy
# Local dev:    npx wrangler dev   (then curl http://localhost:8787/v1/forecast?...)

name = "praeventus"
main = "src/index.js"
compatibility_date = "2024-11-01"

# KV namespace for forecast + narrative caching.
# After `wrangler deploy`, set the printed URL (e.g.
# https://praeventus.<your-subdomain>.workers.dev) as `proxyBaseURL` in the app
# (Settings tab, or WeatherEndpoint.defaultProxyBaseURL).

[ai]
binding = "AI"
